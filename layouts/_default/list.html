{{ define "main" }}
<section class="list-page">
  <header>
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="description">{{ . }}</p>{{ end }}
  </header>
  
  <div class="content">
    {{ .Content }}
  </div>
  
  {{ if and (not .IsHome) .Pages }}
  <ul class="page-list">
    {{ range .Pages }}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      {{ with .Description }}<span class="description">{{ . }}</span>{{ end }}
    </li>
    {{ end }}
  </ul>
  {{ end }}
</section>
{{ end }}
