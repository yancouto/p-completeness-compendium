<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <link rel="apple-touch-icon" sizes="180x180" href="{{ "apple-touch-icon.png" | relURL }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ "favicon-32x32.png" | relURL }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ "favicon-16x16.png" | relURL }}">
  <link rel="icon" href="{{ "favicon.ico" | relURL }}">
  <link rel="manifest" href="{{ "site.webmanifest" | relURL }}">
  
  <!-- KaTeX CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
  <!-- Google Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-25..200&icon_names=dark_mode,light_mode,open_in_new">
  
  <!-- Site CSS -->
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">

  <script>
    (function () {
      var key = 'theme-preference';
      var stored = null;
      try { stored = localStorage.getItem(key); } catch (e) {}
      var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = (stored === 'light' || stored === 'dark') ? stored : (systemDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  
  {{ block "head" . }}{{ end }}
</head>
<body>
  {{ partial "header.html" . }}
  
  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>
  
  {{ partial "footer.html" . }}
  
  <!-- KaTeX JavaScript -->
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      renderMathInElement(document.body, {
        delimiters: [
          {left: "$$", right: "$$", display: true},
          {left: "$", right: "$", display: false},
          {left: "\\[", right: "\\]", display: true},
          {left: "\\(", right: "\\)", display: false}
        ],
        macros: {
          "\\P": "\\mathsf{P}",
          "\\NC": "\\mathsf{NC}",
          "\\FP": "\\mathsf{FP}",
          "\\NP": "\\mathsf{NP}",
          "\\CC": "\\mathsf{CC}",
          "\\coNP": "\\mathsf{coNP}",
          "\\LOGSPACE": "\\mathsf{LOGSPACE}",
          "\\Z": "\\mathbb{Z}",
          "\\R": "\\mathbb{R}",
          "\\Q": "\\mathbb{Q}",
          "\\N": "\\mathbb{N}",
        },
        throwOnError: false
      });
    });
  </script>
  
  {{ block "scripts" . }}{{ end }}
  <script src="{{ "js/theme.js" | relURL }}"></script>
</body>
</html>
