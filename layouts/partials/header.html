<header class="site-header">
  <nav class="nav-container{{ if .IsHome }} nav-home{{ end }}">
    {{ if not .IsHome }}
    <a href="{{ .Site.Home.RelPermalink }}" class="site-title">P-completeness Compendium</a>
    {{ end }}
    <div class="nav-controls">
      <ul class="nav-menu">
        {{ range .Site.Menus.main }}
          <li>
            <a href="{{ .URL }}" {{ if $.IsMenuCurrent "main" . }}class="active"{{ end }}>
              {{ .Name }}
            </a>
          </li>
        {{ end }}
      </ul>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" aria-pressed="false">
        <span class="material-symbols-outlined theme-toggle-icon" aria-hidden="true">dark_mode</span>
        <span class="theme-toggle-label">Dark</span>
      </button>
    </div>
  </nav>
</header>
